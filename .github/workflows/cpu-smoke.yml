name: cpu-smoke

# Cheap required PR gate. It creates a brand-new venv, installs the wheel and
# [test] extra, proves all tests collect, and runs the fast CPU/offline subset.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  clean-install-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RWKV7_CPU_ONLY: "1"
      PYTHON_BIN: python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Clean install, collection, and fast smoke
        run: scripts/run_clean_install_tests.sh smoke
